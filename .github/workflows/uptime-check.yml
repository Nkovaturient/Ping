name: Portal Uptime Check

on:
  schedule:
    # Every 15 minutes, offset by 7 min so we're not hammering GitHub's
    # scheduler at the same moment every other repo's cron job fires on :00/:15.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed so the job can commit data/ back to the repo

concurrency:
  group: uptime-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run uptime check
        run: python scripts/check_uptime.py

      - name: Commit results
        run: |
          git config user.name "portal-uptime-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Uptime check $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
