name: Notification Scrape

on:
  schedule:
    # Offset from uptime-check (:07/:22/:37/:52) — run at :37 and :07 each hour
    - cron: "37 0-23/2 * * *"
    - cron: "7 1-23/2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: notification-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape portal notifications
        run: python scripts/scrape_notifications.py

      - name: Commit results
        run: |
          git config user.name "portal-uptime-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/notifications.json data/notifications_state.json deadlines.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Notification scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
